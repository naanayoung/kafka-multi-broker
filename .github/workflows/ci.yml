name: CI - Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'kafka-1/backend/**'
      - '.github/workflows/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./kafka-1/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/coupon-backend:latest
            ghcr.io/${{ github.repository_owner }}/coupon-backend:${{ github.sha }}
