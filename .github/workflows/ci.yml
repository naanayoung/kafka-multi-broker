name: CI/CD - Build, Push and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kafka-1/backend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./kafka-1/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/coupon-backend:latest
            ghcr.io/${{ github.repository_owner }}/coupon-backend:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-northeast-2 --name kafka-cluster

      - name: Deploy to EKS
        run: |
          kubectl rollout restart deployment backend -n app
          kubectl rollout restart deployment consumer -n app
          kubectl rollout status deployment backend -n app --timeout=120s
          kubectl rollout status deployment consumer -n app --timeout=120s
